    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Tager I imod nye patienter?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ja, vi tager løbende imod nye patienter — både hvis du flytter fra kommunal tandpleje eller skifter fra en anden tandlæge. Du behøver ikke overflytte din journal før første besøg; vi ordner det bagefter."
            }
          },
          {
            "@type": "Question",
            "name": "Jeg har ikke været hos tandlægen i mange år — bliver der skældt ud?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nej. Aldrig. Vi har set det hele før, og første besøg er en samtale, ikke en eksamen. Vi kigger, vi forklarer, og vi lægger en plan i dit tempo."
            }
          },
          {
            "@type": "Question",
            "name": "Kan jeg få bedøvelse eller narkose?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ja. Vi bruger lokalbedøvelse rutinemæssigt ved behandlinger hvor det er relevant. Ved større eller angstfremkaldende indgreb er der mulighed for narkose — ring 65 31 33 00 og spørg, så planlægger vi det sammen."
            }
          },
          {
            "@type": "Question",
            "name": "Hvad koster et rutineeftersyn?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Vores priser følger Tandlægeforeningens overenskomst samt sundhed.dk. Et årligt eftersyn for voksne er delvist dækket af sygesikringen. Ring 65 31 33 00 hvis du vil have en konkret pris inden du kommer."
            }
          },
          {
            "@type": "Question",
            "name": "Har I ventetid?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ved akut behov kan vi ofte finde en tid samme dag i åbningstiden. Til rutineeftersyn ringer du og aftaler en tid, der passer dig."
            }
          }
        ]
      }
    </script>
